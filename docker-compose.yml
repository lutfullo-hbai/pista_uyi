services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - uploads:/app/web/static/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pista_uyi
      POSTGRES_USER: pista_uyi
      POSTGRES_PASSWORD: pista_uyi_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pista_uyi"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
